name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish_target:
        description: "Publish target"
        type: choice
        options: [testpypi, pypi, none]
        default: none

permissions:
  id-token: write    # trusted-publisher OIDC token
  contents: write    # GitHub Release creation and asset upload

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: build-wheels
  # ---------------------------------------------------------------------------
  build-wheels:
    name: Build wheels (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {os: ubuntu-latest, python: "3.10"}
          - {os: ubuntu-latest, python: "3.11"}
          - {os: ubuntu-latest, python: "3.12"}
          - {os: macos-14,      python: "3.10"}
          - {os: macos-14,      python: "3.11"}
          - {os: macos-14,      python: "3.12"}
          - {os: windows-latest, python: "3.10"}
          - {os: windows-latest, python: "3.11"}
          - {os: windows-latest, python: "3.12"}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up QEMU (Linux aarch64 cross-build)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@4574d27a4764455b42196d70a065bc6853246a25  # v3.4.0

      - name: Compute CIBW_BUILD selector
        id: cibw_build
        shell: bash
        run: |
          PY=$(echo "${{ matrix.python }}" | tr -d '.')
          echo "selector=cp${PY}-*" >> "$GITHUB_OUTPUT"

      - name: Build wheels
        uses: pypa/cibuildwheel@ee63bf16da6cddfb925f542f2c7b59ad50e93969  # v2.22.0
        env:
          CIBW_BUILD: ${{ steps.cibw_build.outputs.selector }}

      - name: Upload wheels artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python }}
          path: wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # Job 2: build-sdist
  # ---------------------------------------------------------------------------
  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist
        run: python -m build --sdist

      - name: Verify sdist excludes tests/ and data/
        run: |
          if tar tzf dist/*.tar.gz | grep -E '(^|/)(tests|data)/'; then
            echo "ERROR: tests/ or data/ found in sdist"
            exit 1
          fi
          echo "sdist exclusion check passed"

      - name: Upload sdist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sdist
          path: dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # Job 3: test-sdist
  # ---------------------------------------------------------------------------
  test-sdist:
    name: Test sdist (source install)
    needs: build-sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.12"

      - name: Download sdist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sdist
          path: dist/

      - name: Install cmake
        uses: lukka/get-cmake@ea83089aa35e08e459464341fe24ad024ee2466f  # v4.3.1

      - name: Install from sdist (source build)
        run: pip install dist/*.tar.gz

      - name: Install test dependencies
        run: pip install pytest scipy trimesh

      - name: Run tests
        run: pytest tests/ -q --ignore=tests/test_golden.py --ignore=tests/test_silent_logger.py

  # ---------------------------------------------------------------------------
  # Job 4: publish-testpypi
  # ---------------------------------------------------------------------------
  publish-testpypi:
    name: Publish to TestPyPI
    needs: [build-wheels, build-sdist, test-sdist]
    runs-on: ubuntu-latest
    environment: testpypi-release

    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.publish_target == 'testpypi') ||
      (github.event_name == 'push' && (contains(github.ref, 'rc') || contains(github.ref, 'dev')))

    steps:
      - name: Download wheels artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sdist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4
        with:
          repository-url: https://test.pypi.org/legacy/

  # ---------------------------------------------------------------------------
  # Job 5: publish-pypi
  # ---------------------------------------------------------------------------
  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist, test-sdist]
    runs-on: ubuntu-latest
    environment: pypi-release

    if: >-
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v') &&
      !contains(github.ref, 'rc') &&
      !contains(github.ref, 'dev')

    steps:
      - name: Download wheels artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sdist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415bbaabdfc  # v1.12.4

  # ---------------------------------------------------------------------------
  # Job 6: create-release
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download wheels artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: sdist
          path: dist/

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Create GitHub Release
        run: gh release create ${{ github.ref_name }} dist/* --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
