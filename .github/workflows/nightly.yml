name: Nightly golden tests

on:
  schedule:
    # Run at 02:00 UTC every day
    - cron: "0 2 * * *"
  # Allow manual trigger from the GitHub UI
  workflow_dispatch: {}

jobs:
  golden-tests:
    name: golden tests (ubuntu-latest, python 3.12)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: lukka/get-cmake@v3.28.0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install package with dev and io extras
        run: uv pip install --system ".[dev,io]"

      - name: Check if any .npz golden files exist
        id: check_goldens
        run: |
          if ls tests/golden/*.npz 2>/dev/null | head -1 | grep -q "."; then
            echo "goldens_exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "goldens_exist=false" >> "$GITHUB_OUTPUT"
            echo "No .npz golden files found in tests/golden/ — skipping golden comparison tests"
          fi

      # Tier 3 (gating): visual goldens — these MUST pass.
      - name: Run gating golden tests (Tier 3, non-advisory)
        if: steps.check_goldens.outputs.goldens_exist == 'true'
        run: pytest tests/test_golden.py -v -m "not advisory"

      # Tier 3.5 (advisory): legacy-baseline scientific equivalence. Per the
      # test's own docstring, this "reports discrepancies but does not gate" —
      # cross-platform FP drift makes the 1e-2 tolerance unrealistic on Linux
      # x86_64. Run for visibility, do not fail the workflow on its result.
      - name: Run advisory golden tests (Tier 3.5, non-blocking)
        if: steps.check_goldens.outputs.goldens_exist == 'true'
        continue-on-error: true
        run: pytest tests/test_golden.py -v -m advisory --tb=short

      - name: Skip message (no goldens)
        if: steps.check_goldens.outputs.goldens_exist == 'false'
        run: echo "Golden tests skipped — capture goldens via visual sign-off session first."
